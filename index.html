<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Dressing - Your Style, Your Rule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Preview Section -->
        <main class="game-preview">
            <div id="character" class="character-preview">
                <!-- Layers will be injected here by JS -->
            </div>
            
            <div class="preview-controls">
                <!-- Additional controls like Reset, Save, etc. can go here -->
            </div>
        </main>

        <!-- UI Sidebar -->
        <aside class="game-ui">
            <header class="ui-header">
                <h1>Fashion Queen</h1>
                <p>Crie o visual perfeito</p>
            </header>

            <nav class="categories-list">
                <!-- Categories will be injected here by JS -->
                <button class="category-btn active">Clothing</button>
                <button class="category-btn">Accessories</button>
                <button class="category-btn">Hair</button>
                <button class="category-btn">Shoes</button>
            </nav>

            <section class="items-grid">
                <!-- Items will be injected here by JS -->
            </section>

            <footer class="ui-footer-actions">
                <!-- Optional: Reset button, Randomize button -->
            </footer>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
